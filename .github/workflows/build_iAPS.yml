name: 4. Build iAPS
run-name: Build iAPS (${{ github.ref_name }})
on:
  workflow_dispatch:
  push:

env:  
  UPSTREAM_REPO: Artificial-Pancreas/iAPS
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: ipa-only
  ALIVE_BRANCH: alive

jobs:
  auto_build_check:
    name: Check Auto Build Status
    runs-on: ubuntu-latest
    outputs:
      AUTO_BUILD_ENABLED: ${{ steps.auto-build-enabled.outputs.auto_build }}
    steps:
      - name: Is Auto Build Branch
        id: auto-build-enabled
        run: |
          echo "auto_build=false" >> $GITHUB_OUTPUT
          if [ ! -z "${{ vars.AUTO_BUILD_BRANCHES }}" ]; then
            if echo ",${{ vars.AUTO_BUILD_BRANCHES }}," | grep -q ",${{ github.ref_name }},"; then
              echo "auto_build=true" >> $GITHUB_OUTPUT
            fi
          fi

  check_certs: 
    needs: auto_build_check
    name: Check certificates
    if: false # Disabled to bypass the $99 payment requirement
    uses: ./.github/workflows/create_certs.yml
    secrets: inherit

  check_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Check upstream
    steps:
    - name: Checkout target repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT }}
        ref: ipa-only

  build:
    name: Build
    needs: [auto_build_check, check_latest_from_upstream]
    runs-on: macos-15 # Matches the environment needed for Xcode 26
    permissions:
      contents: write
    steps:
      - name: Select Xcode version
        # Correct path for the toolchain confirmed in your 23:13 build log
        run: "sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer"
      
      - name: Checkout Repo for building
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ${{ env.TARGET_BRANCH }}

      - name: Install Bundler 2.x
        run: |
          gem install bundler -v 2.7.2
          echo "BUNDLER_VER=2.7.2" >> $GITHUB_ENV

      - name: Install project dependencies
        run: bundle _${{ env.BUNDLER_VER }}_ install

      - name: Sync clock
        run: sudo sntp -sS time.windows.com

      - name: Build Unsigned IPA
        run: |
          # Use the shared workspace and scheme names proven to exist in your Discovery log
          xcodebuild archive \
            -workspace FreeAPS.xcworkspace \
            -scheme FreeAPSWorkspace \
            -configuration Release \
            -archivePath FreeAPS.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          mkdir -p artifacts
          mkdir Payload
          # Finds the compiled app regardless of internal naming
          cp -r FreeAPS.xcarchive/Products/Applications/*.app Payload/
          zip -r artifacts/iAPS_unsigned.ipa Payload

      - name: Upload Build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iAPS-Manual-IPA
          path: artifacts/iAPS_unsigned.ipa
