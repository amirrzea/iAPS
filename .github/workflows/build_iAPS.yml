name: 4. Build iAPS (Unsigned IPA)
run-name: Build IPA from ${{ github.ref_name }}
on:
  workflow_dispatch: # Manual trigger only

env:  
  UPSTREAM_REPO: Artificial-Pancreas/iAPS
  UPSTREAM_BRANCH: main # Always pull from the official main
  TARGET_BRANCH: ipa-only
  ALIVE_BRANCH: alive

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ipa-only

      - name: Select Xcode version
        run: "sudo xcode-select --switch /Applications/Xcode_16.0.app/Contents/Developer"

      - name: Install Bundler
        run: |
          gem install bundler -v 2.7.2
          echo "BUNDLER_VER=2.7.2" >> $GITHUB_ENV

      - name: Install dependencies
        run: bundle _${{ env.BUNDLER_VER }}_ install

      - name: Xcode Archive (Unsigned)
        run: |
          xcodebuild archive \
            -workspace iAPS.xcworkspace \
            -scheme iAPS \
            -configuration Release \
            -archivePath iAPS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA Package
        run: |
          mkdir -p artifacts
          mkdir Payload
          cp -r iAPS.xcarchive/Products/Applications/iAPS.app Payload/
          zip -r artifacts/iAPS_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iAPS-Manual-IPA
          path: artifacts/iAPS_unsigned.ipa
