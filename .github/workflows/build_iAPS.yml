name: 4. Build iAPS (Manual IPA)
run-name: Build IPA from ${{ github.ref_name }}
on:
  workflow_dispatch:

env:  
  UPSTREAM_REPO: Artificial-Pancreas/iAPS
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: ipa-only

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ipa-only

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: DISCOVERY - Find the Secret Scheme
        run: |
          echo "--- Searching for all Scheme files (.xcscheme) ---"
          find . -name "*.xcscheme"
          echo "--- Searching Fastfile for the defined scheme ---"
          grep -r "scheme" fastlane/ || echo "No scheme found in Fastlane"

      - name: Install Bundler
        run: |
          gem install bundler -v 2.7.2
          echo "BUNDLER_VER=2.7.2" >> $GITHUB_ENV

      - name: Install dependencies
        run: bundle _2.7.2_ install

      - name: Xcode Archive (Unsigned)
        run: |
          # Trying 'FreeAPSWorkspace' based on your -list output
          xcodebuild archive \
            -workspace FreeAPS.xcworkspace \
            -scheme FreeAPSWorkspace \
            -configuration Release \
            -archivePath FreeAPS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA Package
        run: |
          mkdir -p artifacts
          mkdir Payload
          # Using a wildcard to find the .app regardless of the scheme name
          cp -r FreeAPS.xcarchive/Products/Applications/*.app Payload/
          zip -r artifacts/iAPS_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iAPS-Manual-IPA
          path: artifacts/iAPS_unsigned.ipa
