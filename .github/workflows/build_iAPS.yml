name: 4. Build iAPS (IPA ONLY)
run-name: Build IPA from ${{ github.ref_name }}
on:
  workflow_dispatch: 

env:  
  UPSTREAM_REPO: Artificial-Pancreas/iAPS
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: ipa-only

jobs:
  build:
    name: Build Unsigned IPA
    # STABILITY FIX: Using macos-14 for better pre-installed SDK support
    runs-on: macos-14 
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ipa-only

      - name: Select Xcode Version
        # STABILITY FIX: Xcode 15.4 is the most reliable for unsigned iAPS builds
        run: sudo xcode-select -s /Applications/Xcode_15.4.app 

      - name: Install Bundler
        run: |
          gem install bundler -v 2.7.2
          echo "BUNDLER_VER=2.7.2" >> $GITHUB_ENV

      - name: Install dependencies
        run: bundle _2.7.2_ install

      - name: Xcode Archive (Unsigned)
        run: |
          # SDK FIX: Added -sdk iphoneos to force mobile headers
          xcodebuild archive \
            -workspace FreeAPS.xcworkspace \
            -scheme FreeAPSWorkspace \
            -configuration Release \
            -archivePath FreeAPS.xcarchive \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA Package
        run: |
          mkdir -p artifacts
          mkdir Payload
          # WILDCARD: Finds the .app file regardless of its internal naming
          cp -r FreeAPS.xcarchive/Products/Applications/*.app Payload/
          zip -r artifacts/iAPS_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iAPS-Manual-IPA
          path: artifacts/iAPS_unsigned.ipa
