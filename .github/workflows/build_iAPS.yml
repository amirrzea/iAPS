name: 4. Build iAPS (IPA ONLY)
run-name: Build IPA from ${{ github.ref_name }}
on:
  workflow_dispatch: # Manual trigger for your $20 signing path

env:  
  UPSTREAM_REPO: Artificial-Pancreas/iAPS
  UPSTREAM_BRANCH: main
  TARGET_BRANCH: ipa-only

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest # Using the standard ARM64 runner for 2026
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive
          ref: ipa-only

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_16.app # Reliable stable version for iAPS in 2026

      - name: Install Bundler
        run: |
          gem install bundler -v 2.7.2
          echo "BUNDLER_VER=2.7.2" >> $GITHUB_ENV

      - name: Install dependencies
        run: bundle _2.7.2_ install

      - name: Xcode Archive (Unsigned)
        run: |
          # FIX: Changed iAPS to FreeAPS to match the repository's internal file structure
          xcodebuild archive \
            -workspace FreeAPS.xcworkspace \
            -scheme FreeAPS \
            -configuration Release \
            -archivePath FreeAPS.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create IPA Package
        run: |
          mkdir -p artifacts
          mkdir Payload
          # FIX: Updated paths to match the FreeAPS.xcarchive output
          cp -r FreeAPS.xcarchive/Products/Applications/FreeAPS.app Payload/
          zip -r artifacts/iAPS_unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iAPS-Manual-IPA
          path: artifacts/iAPS_unsigned.ipa
